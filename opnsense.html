<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<title>OPNsense Manager — PegaProx</title>
<style>
  /* =========================================================================
     Tokens lifted from PegaProx (docker_swarm/swarm.html):
       --accent:#e57000 / --bg:#0f1117 / --card:#1a1d27 / --border:#2a2d3a
       --text:#e4e4e7  / --muted:#71717a / --green:#22c55e / --red:#ef4444
       --yellow:#eab308 / --blue:#3b82f6
     Light variant follows PegaProx light layout palette so the iframe blends
     with whichever theme the dashboard ships (?theme=corp-light|corp-dark).
     ========================================================================= */
  :root {
    --accent: #e57000;
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #a1a1aa; /* zinc-400; PegaProx uses #71717a but it fails WCAG AA contrast on --card */
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --blue: #3b82f6;
    --row-hover: rgba(255, 255, 255, 0.03);
  }
  html.theme-light {
    --bg: #f6f7f9;
    --card: #ffffff;
    --border: #e4e7eb;
    --text: #1e2230;
    --muted: #4b5563; /* gray-600; ensures 4.5:1 on white --card */
    --row-hover: rgba(0, 0, 0, 0.025);
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- shell ----------------------------------------------------- */
  .shell {
    padding: 20px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .header h1 .accent { color: var(--accent); }
  .conn {
    flex: 1;
    color: var(--muted);
    font-size: 12px;
    text-align: right;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .conn b { color: var(--text); font-weight: 600; }

  /* ---------- buttons --------------------------------------------------- */
  .btn {
    appearance: none;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    transition: border-color .15s ease, background .15s ease, transform .1s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { border-color: var(--accent); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn:active { transform: translateY(1px); }
  .btn[aria-busy="true"] { color: var(--muted); border-color: var(--border); cursor: wait; }
  /* Bumped from --accent (#e57000) to a deeper orange so #fff text clears WCAG AA. */
  .btn-primary { background: #b75300; border-color: #b75300; color: #fff; font-weight: 600; }
  .btn-primary:hover { background: #9a4500; border-color: #9a4500; }

  /* ---------- tabs ------------------------------------------------------ */
  .tabs {
    display: flex;
    gap: 2px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
    overflow-x: auto;
  }
  .tab {
    appearance: none;
    background: transparent;
    border: 0;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: color .15s ease, border-color .15s ease;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .tab[aria-selected="true"] {
    color: var(--text);
    border-bottom-color: var(--accent);
  }

  /* ---------- cards ----------------------------------------------------- */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .card .title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 0 0 8px;
  }
  .card .lead {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.15;
    color: var(--text);
    margin: 0 0 4px;
    word-break: break-word;
  }
  .card .lead .accent { color: var(--accent); }
  .card .sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ---------- grid system ---------------------------------------------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 12px;
  }
  .span-3 { grid-column: span 3; }
  .span-4 { grid-column: span 4; }
  .span-6 { grid-column: span 6; }
  .span-8 { grid-column: span 8; }
  .span-12 { grid-column: span 12; }

  .section-title {
    grid-column: 1 / -1;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 12px 0 4px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .section-title b { color: var(--text); font-weight: 700; margin-right: 6px; }

  /* ---------- badges (status chips) ------------------------------------ */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 9999px;
    font-size: 11px;
    font-weight: 600;
    gap: 6px;
  }
  .badge::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 9999px;
    background: currentColor;
  }
  /* Badge foreground colours are slightly lighter than the raw token so the
     low-opacity rgba background still clears WCAG AA on --card. */
  .badge-green { background: rgba(34,197,94,.18); color: #4ade80; }
  .badge-red { background: rgba(239,68,68,.18); color: #fca5a5; }
  .badge-yellow { background: rgba(234,179,8,.18); color: #fcd34d; }
  .badge-blue { background: rgba(59,130,246,.18); color: #93c5fd; }
  .badge-muted { background: rgba(113,113,122,.18); color: var(--muted); }
  html.theme-light .badge-green { color: #15803d; }
  html.theme-light .badge-red { color: #b91c1c; }
  html.theme-light .badge-yellow { color: #92400e; }
  html.theme-light .badge-blue { color: #1d4ed8; }
  .chip-row { display: flex; gap: 6px; flex-wrap: wrap; }

  /* ---------- meters ---------------------------------------------------- */
  .meter {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: baseline;
    margin-top: 8px;
    font-size: 12px;
  }
  .meter .label { color: var(--muted); }
  .meter .value { font-variant-numeric: tabular-nums; color: var(--text); font-weight: 600; }
  .meter .bar {
    grid-column: 1 / -1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .meter .bar > i {
    display: block;
    height: 100%;
    background: var(--green);
    transition: width .6s ease;
  }
  .meter.high .bar > i { background: var(--yellow); }
  .meter.crit .bar > i { background: var(--red); }

  /* ---------- tables ---------------------------------------------------- */
  .tt {
    width: 100%;
    border-collapse: collapse;
    margin-top: 4px;
  }
  .tt caption { display: none; }
  .tt th, .tt td {
    text-align: left;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    vertical-align: top;
  }
  .tt th {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .tt tbody tr:hover { background: var(--row-hover); }
  .tt td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .tt td.dim { color: var(--muted); }
  .tt b { font-weight: 600; }
  .tt code, .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }

  /* ---------- sparklines + chart -------------------------------------- */
  .spark { display: block; height: 18px; width: 80px; }
  .spark path.rx { fill: rgba(34,197,94,.15); stroke: var(--green); stroke-width: 1; }
  .spark path.tx { fill: rgba(59,130,246,.15); stroke: var(--blue); stroke-width: 1; }
  .rate { font-variant-numeric: tabular-nums; font-size: 11px; }
  /* Use lighter green/blue tones so rate readings clear WCAG AA on --card. */
  .rate .rx { color: #4ade80; }
  .rate .tx { color: #93c5fd; }
  html.theme-light .rate .rx { color: #15803d; }
  html.theme-light .rate .tx { color: #1d4ed8; }

  .chart-card svg.area-chart { width: 100%; height: 240px; display: block; }
  .chart-card .legend {
    display: flex; flex-wrap: wrap; gap: 12px;
    font-size: 12px; color: var(--muted);
    margin-top: 8px;
  }
  .chart-card .legend .dot {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 2px; margin-right: 4px; vertical-align: middle;
  }
  .chart-card .axis text { fill: var(--muted); font-size: 10px; font-family: inherit; }
  .chart-card .axis line { stroke: var(--border); stroke-width: 1; }
  .chart-card .grid-line { stroke: var(--border); stroke-width: 1; stroke-dasharray: 2 3; opacity: .6; }

  /* ---------- drilldown dialog --------------------------------------- */
  dialog.drilldown {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0;
    width: min(960px, 92vw);
    max-height: 90vh;
    overflow: auto;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  }
  dialog.drilldown::backdrop { background: rgba(0, 0, 0, 0.6); }
  dialog.drilldown .dl-head {
    position: sticky; top: 0;
    background: var(--card);
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  dialog.drilldown .dl-head h2 {
    margin: 0;
    font-size: 15px; font-weight: 700;
    letter-spacing: -0.01em;
  }
  dialog.drilldown .dl-head h2 .label {
    color: var(--muted); font-weight: 500; margin-left: 6px; font-size: 12px;
  }
  dialog.drilldown .dl-body { padding: 18px; }
  dialog.drilldown .dl-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    margin-bottom: 14px;
  }
  dialog.drilldown .stat {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
  }
  dialog.drilldown .stat .k {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); font-weight: 600;
  }
  dialog.drilldown .stat .v {
    font-size: 14px; font-weight: 700; color: var(--text);
    font-variant-numeric: tabular-nums;
    margin-top: 4px; word-break: break-word;
  }
  dialog.drilldown svg.dl-chart { width: 100%; height: 220px; display: block; }
  dialog.drilldown .dl-empty {
    color: var(--muted); font-size: 12px; padding: 20px; text-align: center;
  }
  @media (max-width: 768px) {
    dialog.drilldown .dl-grid { grid-template-columns: repeat(2, 1fr); }
  }
  .iface-link {
    appearance: none; background: transparent; border: 0; padding: 0;
    color: inherit; font: inherit; cursor: pointer;
    text-decoration: underline; text-decoration-color: transparent;
    transition: text-decoration-color .15s ease, color .15s ease;
  }
  .iface-link:hover { color: var(--accent); text-decoration-color: var(--accent); }
  .iface-link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 2px; }

  /* ---------- log viewer ----------------------------------------------- */
  .log-toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .log-toolbar input[type="search"], .log-toolbar select {
    appearance: none;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    padding: 6px 10px;
    font-family: inherit;
  }
  .log-toolbar input[type="search"] { min-width: 220px; }
  .log-toolbar input:focus-visible, .log-toolbar select:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 1px;
  }
  .log-toolbar .summary { color: var(--muted); font-size: 12px; margin-left: auto; }

  /* ---------- banners (errors / empty) -------------------------------- */
  .banner {
    grid-column: 1 / -1;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid var(--red);
    background: rgba(239, 68, 68, 0.1);
    color: var(--red);
    font-size: 13px;
  }
  .banner b { color: var(--text); font-weight: 700; }
  .banner.dim { border-color: var(--border); background: var(--card); color: var(--muted); }

  /* ---------- skeletons ------------------------------------------------ */
  .skeleton {
    background: linear-gradient(90deg, var(--border) 0%, var(--row-hover) 50%, var(--border) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s linear infinite;
    height: 14px;
    border-radius: 4px;
  }
  .skeleton.lg { height: 24px; width: 60%; }
  .skeleton.xl { height: 36px; width: 80%; }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .skeleton { animation: none; }
    *, *::before, *::after { transition: none !important; }
  }

  /* ---------- responsive ----------------------------------------------- */
  @media (max-width: 1280px) {
    .span-3 { grid-column: span 4; }
    .span-4 { grid-column: span 6; }
  }
  @media (max-width: 1024px) {
    .grid { grid-template-columns: repeat(6, 1fr); }
    .span-3 { grid-column: span 3; }
    .span-4 { grid-column: span 6; }
    .span-6 { grid-column: span 6; }
    .span-8 { grid-column: span 6; }
    .conn { display: none; }
  }
  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; }
    .span-3, .span-4, .span-6, .span-8 { grid-column: span 1; }
    .shell { padding: 14px; }
    .header h1 { font-size: 16px; }
  }

  .vh {
    position: absolute;
    width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }
</style>
</head>
<body>
<div class="shell">
  <header class="header" role="banner">
    <h1>
      <span class="accent">OPNsense</span>
      <span style="color: var(--muted); font-weight: 500; font-size: 12px; margin-left: 4px;">Manager</span>
    </h1>
    <div class="conn" id="conn" aria-live="polite">
      <b id="conn-host">—</b>
      <span id="conn-version">cargando…</span>
    </div>
    <button class="btn" type="button" id="btn-refresh" aria-label="Refrescar vista">Refresh</button>
  </header>

  <nav aria-label="Secciones del plugin">
  <div class="tabs" role="tablist">
    <button class="tab" role="tab" id="tab-overview" data-tab="overview" aria-selected="true" aria-controls="grid">Overview</button>
    <button class="tab" role="tab" id="tab-network" data-tab="network" aria-selected="false" aria-controls="grid">Network</button>
    <button class="tab" role="tab" id="tab-vpn" data-tab="vpn" aria-selected="false" aria-controls="grid">VPN</button>
    <button class="tab" role="tab" id="tab-logs" data-tab="logs" aria-selected="false" aria-controls="grid">Logs</button>
    <button class="tab" role="tab" id="tab-nat" data-tab="nat" aria-selected="false" aria-controls="grid">NAT</button>
    <button class="tab" role="tab" id="tab-dns" data-tab="dns" aria-selected="false" aria-controls="grid">DNS</button>
    <button class="tab" role="tab" id="tab-wg" data-tab="wg" aria-selected="false" aria-controls="grid">WG peers</button>
  </div>
  </nav>

  <main>
  <div id="grid" class="grid" role="tabpanel" aria-busy="true" aria-labelledby="tab-overview">
    <section class="card span-12" aria-label="Cargando">
      <div class="title">[ system ]</div>
      <div class="skeleton xl" role="presentation" style="margin-top:8px;"></div>
      <div class="skeleton lg" role="presentation" style="margin-top:8px;"></div>
    </section>
  </div>
  </main>
</div>

<dialog id="drilldown" class="drilldown" aria-labelledby="dl-title">
  <div class="dl-head">
    <h2 id="dl-title">Interfaz</h2>
    <button class="btn" type="button" id="dl-close" aria-label="Cerrar detalle">Cerrar</button>
  </div>
  <div class="dl-body" id="dl-body"></div>
</dialog>

<script type="module">
  // Theme awareness — PegaProx passes ?theme=corp-light|corp-dark|... when
  // it embeds the plugin in its iframe. Treat anything containing "light"
  // as light mode, default to dark.
  (function applyTheme() {
    const params = new URLSearchParams(location.search);
    const theme = params.get("theme") || "";
    if (/light/i.test(theme)) {
      document.documentElement.classList.add("theme-light");
    }
  })();

  const $ = (s, r = document) => r.querySelector(s);
  const $$ = (s, r = document) => Array.from(r.querySelectorAll(s));
  const el = (tag, attrs = {}, children = []) => {
    const n = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
      if (k === "class") n.className = v;
      else if (k === "html") n.innerHTML = v;
      else if (k === "text") n.textContent = v;
      else if (k.startsWith("aria-") || k === "role") n.setAttribute(k, v);
      else if (k.startsWith("data-")) n.setAttribute(k, v);
      else n[k] = v;
    }
    for (const c of (Array.isArray(children) ? children : [children])) {
      if (c == null) continue;
      n.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
    }
    return n;
  };
  const fmtBytes = (n) => {
    if (!n || n < 0) return "0 B";
    const u = ["B", "KB", "MB", "GB", "TB", "PB"];
    let i = 0, v = n;
    while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
    return `${v.toFixed(v >= 100 ? 0 : v >= 10 ? 1 : 2)} ${u[i]}`;
  };
  const meterClass = (p) => p > 85 ? "crit" : p > 65 ? "high" : "";
  const escapeText = (s) => String(s ?? "").replace(/[<>&"]/g, c => ({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c]));

  // ---------- traffic samples (in-memory ring buffer per iface) ----------
  // OPNsense exposes acumulative byte counters; we compute rates client-side
  // by diffing samples poll-to-poll. Window kept small (60 samples) so the
  // memory footprint stays trivial even on busy firewalls.
  const TRAFFIC_WINDOW = 60;
  const trafficSamples = new Map(); // iface name -> [{t, rx, tx}]
  const trafficRates = new Map();   // iface name -> [{t, rxRate, txRate}]

  function pushTrafficSample(name, rxBytes, txBytes) {
    const t = Date.now();
    let buf = trafficSamples.get(name);
    if (!buf) { buf = []; trafficSamples.set(name, buf); }
    const last = buf[buf.length - 1];
    buf.push({ t, rx: rxBytes, tx: txBytes });
    if (buf.length > TRAFFIC_WINDOW) buf.shift();

    if (last) {
      const dt = (t - last.t) / 1000;
      let rates = trafficRates.get(name);
      if (!rates) { rates = []; trafficRates.set(name, rates); }
      // Counter wrap or reset → drop the negative delta to 0.
      const drx = Math.max(0, rxBytes - last.rx);
      const dtx = Math.max(0, txBytes - last.tx);
      rates.push({
        t,
        rxRate: dt > 0 ? drx / dt : 0,
        txRate: dt > 0 ? dtx / dt : 0,
      });
      if (rates.length > TRAFFIC_WINDOW) rates.shift();
    }
  }

  // Caches so the drilldown can show iface metadata + neighbors.
  const lastInterfaces = new Map(); // name -> row object
  let lastArp = [], lastNdp = [];

  function ingestInterfaces(rows) {
    for (const i of rows || []) {
      pushTrafficSample(i.name, i.received_bytes || 0, i.sent_bytes || 0);
      lastInterfaces.set(i.name, i);
    }
  }

  function fmtRate(bytesPerSec) {
    return fmtBytes(bytesPerSec) + "/s";
  }

  function sparkline(name) {
    const rates = trafficRates.get(name) || [];
    const svgNS = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(svgNS, "svg");
    svg.setAttribute("class", "spark");
    svg.setAttribute("viewBox", "0 0 80 18");
    svg.setAttribute("preserveAspectRatio", "none");
    svg.setAttribute("aria-hidden", "true");
    if (rates.length < 2) return svg;
    const max = Math.max(1, ...rates.map(r => Math.max(r.rxRate, r.txRate)));
    const xStep = 80 / (TRAFFIC_WINDOW - 1);
    function pathFor(key, cls) {
      const offset = TRAFFIC_WINDOW - rates.length;
      const pts = rates.map((r, i) => {
        const x = (offset + i) * xStep;
        const y = 18 - (r[key] / max) * 16 - 1;
        return [x, y];
      });
      const first = pts[0];
      const last = pts[pts.length - 1];
      let d = `M${first[0].toFixed(1)},18 L${first[0].toFixed(1)},${first[1].toFixed(1)}`;
      for (const p of pts.slice(1)) d += ` L${p[0].toFixed(1)},${p[1].toFixed(1)}`;
      d += ` L${last[0].toFixed(1)},18 Z`;
      const p = document.createElementNS(svgNS, "path");
      p.setAttribute("d", d);
      p.setAttribute("class", cls);
      return p;
    }
    svg.appendChild(pathFor("rxRate", "rx"));
    svg.appendChild(pathFor("txRate", "tx"));
    return svg;
  }

  function getCurrentRate(name) {
    const rates = trafficRates.get(name) || [];
    const last = rates[rates.length - 1];
    return last ? { rx: last.rxRate, tx: last.txRate } : { rx: 0, tx: 0 };
  }

  function trafficChart(rows) {
    // Pick top 4 by current total throughput.
    const ranked = (rows || [])
      .map(i => {
        const r = getCurrentRate(i.name);
        return { name: i.name, label: i.label || i.name, total: r.rx + r.tx };
      })
      .sort((a, b) => b.total - a.total)
      .slice(0, 4);

    const colors = ["#e57000", "#22c55e", "#3b82f6", "#eab308"];
    const W = 800, H = 240, padL = 56, padR = 12, padT = 12, padB = 24;
    const innerW = W - padL - padR;
    const innerH = H - padT - padB;

    // Build a unified time axis from the longest series among the picks.
    let maxLen = 0;
    for (const p of ranked) {
      const r = trafficRates.get(p.name) || [];
      if (r.length > maxLen) maxLen = r.length;
    }
    const xStep = maxLen > 1 ? innerW / (maxLen - 1) : 0;

    let yMax = 1;
    for (const p of ranked) {
      const r = trafficRates.get(p.name) || [];
      for (const s of r) {
        if (s.rxRate + s.txRate > yMax) yMax = s.rxRate + s.txRate;
      }
    }

    const svgNS = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(svgNS, "svg");
    svg.setAttribute("class", "area-chart");
    svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
    svg.setAttribute("preserveAspectRatio", "none");
    svg.setAttribute("role", "img");
    svg.setAttribute("aria-label", "Tráfico por interfaz");

    // grid lines + y labels
    const ticks = 4;
    const axis = document.createElementNS(svgNS, "g");
    axis.setAttribute("class", "axis");
    for (let k = 0; k <= ticks; k++) {
      const v = (yMax * k) / ticks;
      const y = padT + innerH - (innerH * k) / ticks;
      const ln = document.createElementNS(svgNS, "line");
      ln.setAttribute("class", "grid-line");
      ln.setAttribute("x1", padL); ln.setAttribute("x2", W - padR);
      ln.setAttribute("y1", y); ln.setAttribute("y2", y);
      axis.appendChild(ln);
      const tx = document.createElementNS(svgNS, "text");
      tx.setAttribute("x", padL - 6);
      tx.setAttribute("y", y + 3);
      tx.setAttribute("text-anchor", "end");
      tx.textContent = fmtRate(v);
      axis.appendChild(tx);
    }
    svg.appendChild(axis);

    // each interface gets its own area path (rx+tx combined for legibility)
    ranked.forEach((p, idx) => {
      const r = trafficRates.get(p.name) || [];
      if (r.length < 2) return;
      const offset = maxLen - r.length;
      const pts = r.map((s, i) => {
        const x = padL + (offset + i) * xStep;
        const v = s.rxRate + s.txRate;
        const y = padT + innerH - (v / yMax) * innerH;
        return [x, y];
      });
      const first = pts[0];
      const last = pts[pts.length - 1];
      let d = `M${first[0].toFixed(1)},${(padT + innerH).toFixed(1)} L${first[0].toFixed(1)},${first[1].toFixed(1)}`;
      for (const pt of pts.slice(1)) d += ` L${pt[0].toFixed(1)},${pt[1].toFixed(1)}`;
      d += ` L${last[0].toFixed(1)},${(padT + innerH).toFixed(1)} Z`;
      const path = document.createElementNS(svgNS, "path");
      path.setAttribute("d", d);
      path.setAttribute("fill", colors[idx] + "33");
      path.setAttribute("stroke", colors[idx]);
      path.setAttribute("stroke-width", "1.5");
      svg.appendChild(path);
    });

    // legend
    const legend = el("div", { class: "legend" });
    ranked.forEach((p, idx) => {
      const r = getCurrentRate(p.name);
      const total = fmtRate(r.rx + r.tx);
      legend.appendChild(el("span", {}, [
        el("span", { class: "dot", style: `background:${colors[idx]}` }),
        document.createTextNode(`${p.label} · ${total}`),
      ]));
    });
    if (!ranked.length) {
      legend.appendChild(el("span", { class: "dim", text: "Esperando muestras…" }));
    }

    const cell = el("section", { class: "card span-12 chart-card", "aria-label": "Tráfico por interfaz" }, [
      el("p", { class: "title" }, "[ tráfico en vivo ]"),
    ]);
    cell.appendChild(svg);
    cell.appendChild(legend);
    return cell;
  }

  async function fetchJson(url) {
    const r = await fetch(url, { credentials: "same-origin" });
    if (r.status === 401) throw Object.assign(new Error("auth"), { kind: "auth" });
    if (!r.ok) {
      let detail = "";
      try { detail = (await r.json()).detail || ""; } catch {}
      throw Object.assign(new Error(`HTTP ${r.status}`), { kind: "upstream", detail });
    }
    const body = await r.json();
    if (!body.ok) throw Object.assign(new Error(body.error || "upstream"), { kind: body.error || "upstream", detail: body.detail });
    return body.data;
  }

    const cell = el("section", { class: "card span-12", "aria-label": "Entradas del firewall log" }, [

    ]);
    const table = el("table", { class: "tt" });

      <thead><tr>
        <th>Time</th><th>Iface</th><th>Acción</th><th>Dir</th><th>Regla</th>
        <th>Src</th><th>Dst</th><th>Proto</th><th class="num">Len</th>
      </tr></thead><tbody></tbody>`;
    const tb = $("tbody", table);
    for (const r of entries) {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="dim mono">${escapeText(r.timestamp)}</td>
        <td>${escapeText(r.interface)}</td>
        <td>${badgeForAction(r.action)}</td>
        <td class="dim">${escapeText(r.direction)}</td>

  function applyLogFilters() {
    const q = (logState.filter || "").toLowerCase();
    const action = logState.action;
    return logState.entries.filter(r => {
      if (action && r.action !== action) return false;
      if (!q) return true;
      const hay = `${r.src} ${r.dst} ${r.interface} ${r.rule_label} ${r.protocol}`.toLowerCase();
      return hay.includes(q);
    });
  }

  function rerenderLogs() {
    const filtered = applyLogFilters();
    const main = $("#grid");
    main.replaceChildren(logToolbar(), logTable(filtered));
    $("#log-summary").textContent = `${filtered.length} de ${logState.entries.length} entradas`;
    $("#log-filter").addEventListener("input", e => {
      logState.filter = e.target.value;
      const filtered = applyLogFilters();
      // re-render only the table to keep input focus
      const cell = main.lastElementChild;
      const newTable = logTable(filtered);
      cell.replaceWith(newTable);
      $("#log-summary").textContent = `${filtered.length} de ${logState.entries.length} entradas`;
    });
    $("#log-action").addEventListener("change", e => {
      logState.action = e.target.value;
      rerenderLogs();
    });
  }

  function crudForm({ titleText, fields, formState, busy, error, onSubmit }) {
    const card = el("section", { class: "card span-12", "aria-label": titleText }, [

    ]);
    const grid = el("div", { style: "display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 8px;" });

      input.type = "text";
      input.value = formState[f.key] ?? "";
      input.style.cssText = "background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px 10px; font-size: 13px; font-family: inherit;";
      input.setAttribute("aria-label", f.label);
      input.addEventListener("input", (e) => { formState[f.key] = e.target.value; });
      wrap.appendChild(input);
      grid.appendChild(wrap);
    }
    card.appendChild(grid);
    const actions = el("div", { style: "display: flex; gap: 8px; align-items: center; margin-top: 10px;" });
    const btn = el("button", { class: "btn btn-primary", type: "button" }, ["Crear"]);
    btn.disabled = busy; btn.setAttribute("aria-busy", busy ? "true" : "false");
    btn.addEventListener("click", onSubmit);
    actions.appendChild(btn);
    if (error) {
      actions.appendChild(el("span", { style: "color: #fca5a5; font-size: 12px; font-weight: 600;", role: "alert", text: "Error: " + error }));
    }
    card.appendChild(actions);
    return card;
  }

  function crudTable({ titleText, rows, columns, onDelete, busy }) {
    const card = el("section", { class: "card span-12", "aria-label": titleText }, [
      el("p", { class: "title", text: `[ ${titleText} (${rows.length}) ]` }),
    ]);
    const t = document.createElement("table");
    t.className = "tt";
    const ths = columns.map(c => `<th>${escapeText(c.h)}</th>`).join("") + '<th><span class="vh">Acciones</span></th>';
    t.innerHTML = `<thead><tr>${ths}</tr></thead><tbody></tbody>`;
    const tb = $("tbody", t);
    for (const r of rows) {
      const tr = document.createElement("tr");
      const cells = columns.map(c => {
        const v = c.fn ? c.fn(r) : (r[c.k] ?? "—");
        return `<td class="${c.cls || ""}">${escapeText(String(v ?? "—"))}</td>`;
      }).join("");
      tr.innerHTML = cells + "<td></td>";
      const btn = el("button", { class: "btn", type: "button", "aria-label": `Eliminar ${r.uuid}`, text: "Eliminar" });
      btn.disabled = busy;
      btn.addEventListener("click", () => onDelete(r.uuid));
      tr.lastElementChild.appendChild(btn);
      tb.appendChild(tr);
    }
    if (!rows.length) {
      tb.innerHTML = `<tr><td colspan="${columns.length + 1}" class="dim">Sin entradas configuradas.</td></tr>`;
    }
    card.appendChild(t);
    return card;
  }

    svg.setAttribute("class", "dl-chart");
    const W = 920, H = 220, padL = 56, padR = 12, padT = 12, padB = 24;
    svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
    svg.setAttribute("preserveAspectRatio", "none");
    svg.setAttribute("role", "img");
    svg.setAttribute("aria-label", `Tráfico en vivo de ${name}`);
    const innerW = W - padL - padR;
    const innerH = H - padT - padB;

    if (rates.length < 2) {
      const t = document.createElementNS(svgNS, "text");
      t.setAttribute("x", W / 2); t.setAttribute("y", H / 2);
      t.setAttribute("text-anchor", "middle");
      t.setAttribute("fill", "var(--muted)");
      t.textContent = "Esperando muestras…";
      svg.appendChild(t);
      return svg;
    }

    const yMax = Math.max(1, ...rates.map(r => Math.max(r.rxRate, r.txRate)));
    const xStep = innerW / (TRAFFIC_WINDOW - 1);

    // grid + y axis
    const ticks = 4;
    const axis = document.createElementNS(svgNS, "g");
    axis.setAttribute("class", "axis");
    for (let k = 0; k <= ticks; k++) {
      const v = (yMax * k) / ticks;
      const y = padT + innerH - (innerH * k) / ticks;
      const ln = document.createElementNS(svgNS, "line");
      ln.setAttribute("class", "grid-line");
      ln.setAttribute("x1", padL); ln.setAttribute("x2", W - padR);
      ln.setAttribute("y1", y); ln.setAttribute("y2", y);
      axis.appendChild(ln);
      const tx = document.createElementNS(svgNS, "text");
      tx.setAttribute("x", padL - 6);
      tx.setAttribute("y", y + 3);
      tx.setAttribute("text-anchor", "end");
      tx.textContent = fmtRate(v);
      axis.appendChild(tx);
    }
    svg.appendChild(axis);

    function line(key, color) {
      const offset = TRAFFIC_WINDOW - rates.length;
      const pts = rates.map((s, i) => {
        const x = padL + (offset + i) * xStep;
        const y = padT + innerH - (s[key] / yMax) * innerH;
        return [x, y];
      });
      let d = `M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
      for (const p of pts.slice(1)) d += ` L${p[0].toFixed(1)},${p[1].toFixed(1)}`;
      const path = document.createElementNS(svgNS, "path");
      path.setAttribute("d", d);
      path.setAttribute("fill", "none");
      path.setAttribute("stroke", color);
      path.setAttribute("stroke-width", "2");
      svg.appendChild(path);
    }
    line("rxRate", "#22c55e");
    line("txRate", "#3b82f6");
    return svg;
  }

  async function fetchLogsForIface(name, limit = 200) {
    try {
      const data = await fetchJson(ENDPOINTS.logs + "?limit=" + limit);
      return (data.entries || []).filter(r => r.interface === name);
    } catch {
      return null; // signal failure
    }
  }

  function appendLogsCard(body, name, entries) {
    const card = el("section", { class: "card", style: "padding: 12px; margin-top: 12px;" }, [
      el("p", { class: "title", text: `[ eventos firewall recientes en ${escapeText(name)} ]` }),
    ]);
    if (entries == null) {
      card.appendChild(el("div", { class: "dl-empty", text: "No se pudieron cargar los eventos del firewall." }));
      body.appendChild(card);
      return;
    }
    if (!entries.length) {
      card.appendChild(el("div", { class: "dl-empty", text: "Sin eventos recientes en esta interfaz." }));
      body.appendChild(card);
      return;
    }
    const t = document.createElement("table");
    t.className = "tt";
    t.innerHTML = `<thead><tr><th>Time</th><th>Acción</th><th>Dir</th><th>Src</th><th>Dst</th><th>Proto</th></tr></thead><tbody></tbody>`;
    const tb = $("tbody", t);
    const cls = (a) => a === "pass" ? "badge-green" : a === "block" ? "badge-red" : a === "rdr" || a === "nat" ? "badge-blue" : "badge-muted";
    for (const r of entries.slice(0, 30)) {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="dim mono">${escapeText(r.timestamp)}</td>
        <td><span class="badge ${cls(r.action)}">${escapeText(r.action)}</span></td>
        <td class="dim">${escapeText(r.direction)}</td>
        <td class="mono">${escapeText(r.src)}</td>
        <td class="mono">${escapeText(r.dst)}</td>
        <td class="dim">${escapeText(r.protocol)}</td>`;
      tb.appendChild(tr);
    }
    card.appendChild(t);
    if (entries.length > 30) {
      card.appendChild(el("div", { class: "sub", text: `Mostrando 30 de ${entries.length} eventos.` }));
    }
    body.appendChild(card);
  }

  async function openDrilldown(name) {
    const dlg = $("#drilldown");
    const body = $("#dl-body");
    const title = $("#dl-title");
    const i = lastInterfaces.get(name);
    title.innerHTML = `<span class="accent">${escapeText(name)}</span>${i?.label ? `<span class="label">${escapeText(i.label)}</span>` : ""}`;
    body.replaceChildren();

    if (!i) {
      body.appendChild(el("div", { class: "dl-empty", text: "Sin datos para esta interfaz." }));
    } else {
      const r = getCurrentRate(name);
      const ip4 = (i.ipv4 || []).map(x => `${x.ipaddr}/${x.subnetbits}`).join(" ") || "—";
      const ip6 = (i.ipv6 || []).map(x => `${x.ipaddr}/${x.subnetbits}`).join(" ") || "—";
      const stats = el("div", { class: "dl-grid" }, [
        el("div", { class: "stat" }, [el("div", { class: "k", text: "Estado" }), el("div", { class: "v", text: i.is_up ? "UP" : "DOWN" })]),
        el("div", { class: "stat" }, [el("div", { class: "k", text: "RX rate" }), el("div", { class: "v", text: fmtRate(r.rx) })]),
        el("div", { class: "stat" }, [el("div", { class: "k", text: "TX rate" }), el("div", { class: "v", text: fmtRate(r.tx) })]),
        el("div", { class: "stat" }, [el("div", { class: "k", text: "MTU" }), el("div", { class: "v", text: String(i.mtu || "—") })]),
        el("div", { class: "stat" }, [el("div", { class: "k", text: "RX total" }), el("div", { class: "v", text: fmtBytes(i.received_bytes) })]),
        el("div", { class: "stat" }, [el("div", { class: "k", text: "TX total" }), el("div", { class: "v", text: fmtBytes(i.sent_bytes) })]),
        el("div", { class: "stat" }, [el("div", { class: "k", text: "Errores" }), el("div", { class: "v", text: String((i.received_errors || 0) + (i.send_errors || 0)) })]),
        el("div", { class: "stat" }, [el("div", { class: "k", text: "Drops" }), el("div", { class: "v", text: String(i.dropped_packets || 0) })]),
        el("div", { class: "stat", style: "grid-column: span 2;" }, [el("div", { class: "k", text: "IPv4" }), el("div", { class: "v mono", text: ip4 })]),
        el("div", { class: "stat", style: "grid-column: span 2;" }, [el("div", { class: "k", text: "IPv6" }), el("div", { class: "v mono", text: ip6 })]),
      ]);
      body.appendChild(stats);

      const chartCard = el("section", { class: "card chart-card", style: "padding: 12px;" }, [
        el("p", { class: "title", text: "[ tráfico — RX (verde) / TX (azul) ]" }),
      ]);
      chartCard.appendChild(dlChart(name));
      body.appendChild(chartCard);

      // Filter neighbors to this iface (by interface_name or interface label)
      const matchIface = (n) => n.interface_name === name || n.interface === (i.label || name) || n.interface === name;
      const arp = lastArp.filter(matchIface).slice(0, 30);
      const ndp = lastNdp.filter(matchIface).slice(0, 30);
      if (arp.length || ndp.length) {
        const tbl = el("section", { class: "card", style: "padding: 12px; margin-top: 12px;" }, [
          el("p", { class: "title", text: `[ neighbors en ${escapeText(name)} ]` }),
        ]);
        const t = document.createElement("table");
        t.className = "tt";
        t.innerHTML = `<thead><tr><th>Familia</th><th>IP</th><th>MAC</th><th>Host</th></tr></thead><tbody></tbody>`;
        const tb = $("tbody", t);
        for (const n of [...arp, ...ndp]) {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td class="dim">${n.family}</td><td class="mono">${escapeText(n.ip)}</td><td class="mono dim">${escapeText(n.mac || "—")}</td><td class="dim">${escapeText(n.hostname || n.manufacturer || "—")}</td>`;
          tb.appendChild(tr);
        }
        tbl.appendChild(t);
        body.appendChild(tbl);
      } else {
        body.appendChild(el("div", { class: "dl-empty", text: "Sin vecinos descubiertos en esta interfaz (o tab Network aún no consultada)." }));
      }

      // Lazy load firewall events for this iface (skeleton first, then table).
      const logsCard = el("section", { class: "card", style: "padding: 12px; margin-top: 12px;" }, [
        el("p", { class: "title", text: `[ eventos firewall recientes en ${escapeText(name)} ]` }),
        el("div", { class: "skeleton lg", role: "presentation", style: "margin-top:8px;" }),
        el("div", { class: "skeleton", role: "presentation", style: "margin-top:6px; width: 90%;" }),
        el("div", { class: "skeleton", role: "presentation", style: "margin-top:6px; width: 80%;" }),
      ]);
      body.appendChild(logsCard);
      fetchLogsForIface(name).then(entries => {
        // Only swap if this dialog is still showing the same iface.
        if (!dlg.open || title.textContent.indexOf(name) === -1) return;
        logsCard.remove();
        appendLogsCard(body, name, entries);
      });
    }
    dlg.showModal();
  }

  function closeDrilldown() { $("#drilldown")?.close(); }

  // delegated click — works for tables re-rendered after every poll
  document.addEventListener("click", (e) => {
    const link = e.target.closest?.(".iface-link");
    if (link?.dataset?.iface) {
      e.preventDefault();
      openDrilldown(link.dataset.iface);
    }
  });

  // ---------- tab router ----------
  const TAB_CONFIG = {
    overview: { endpoint: ENDPOINTS.overview, render: renderOverview, refresh: 10_000 },
    network:  { endpoint: ENDPOINTS.network,  render: renderNetwork,  refresh: 10_000 },
    vpn:      { endpoint: ENDPOINTS.overview, render: renderVPN,      refresh: 30_000 },
    logs:     { endpoint: ENDPOINTS.logs + "?limit=200", render: renderLogs, refresh: 10_000 },
    nat:      { custom: true, refresh: 0 },
    dns:      { custom: true, refresh: 0 },
    wg:       { custom: true, refresh: 0 },
  };

  let currentTab = "overview";
  let pollTimer = null;
  let inFlight = false;

  function setActiveTab(name) {
    if (!TAB_CONFIG[name]) name = "overview";
    currentTab = name;
    for (const t of $$(".tab")) {
      const sel = t.dataset.tab === name;
      t.setAttribute("aria-selected", sel ? "true" : "false");
    }
    const main = $("#grid");
    main.setAttribute("aria-labelledby", `tab-${name}`);
    if (location.hash.replace("#", "") !== name) {
      history.replaceState(null, "", `#${name}`);
    }
  }

  function renderError(err) {
    const main = $("#grid");
    main.setAttribute("aria-busy", "false");
    let title = "Error upstream";
    let body = err.detail || err.message || "Error desconocido";
    if (err.kind === "auth") {
      title = "Autenticación falló";
      body = "OPNsense rechazó la API key + secret. Revisá la configuración del plugin.";
    } else if (err.kind === "timeout") {
      title = "Timeout";
      body = "OPNsense no respondió a tiempo. Reintentá o verificá conectividad.";
    } else if (err.kind === "unconfigured") {
      title = "Plugin sin configurar";
      body = "Editá /opt/PegaProx/plugins/opnsense/config.json con un host OPNsense.";
    }
    main.replaceChildren(
      el("div", { class: "banner", role: "alert" }, [
        el("b", { text: title }),
        document.createTextNode(" — " + body),
      ])
    );
  }

  async function loadCurrentTab() {
    if (inFlight) return;
    inFlight = true;
    const cfg = TAB_CONFIG[currentTab];
    const main = $("#grid");
    main.setAttribute("aria-busy", "true");
    const btn = $("#btn-refresh");
    btn.setAttribute("aria-busy", "true");
    btn.disabled = true;
    try {
      if (cfg.custom && currentTab === "nat") {
        await Promise.all([natList(), oneToOneList()]);
        renderNatTab();
        main.setAttribute("aria-busy", "false");
        return;
      }
      if (cfg.custom && currentTab === "dns") {
        await Promise.all([dnsList(), dnsDomList()]);
        renderDnsTab();
        main.setAttribute("aria-busy", "false");
        return;
      }
      if (cfg.custom && currentTab === "wg") {
        await wgList();
        renderWgTab();
        main.setAttribute("aria-busy", "false");
        return;
      }
      const data = await fetchJson(cfg.endpoint);
      // overview/network include system info we use for the conn header
      if (data.system) renderHeader(data.system);
      // Ingest iface counters for live rate/sparklines.
      if (data.interfaces) ingestInterfaces(data.interfaces);
      const nodes = cfg.render(data);
      if (nodes !== null) {
        main.replaceChildren(...nodes);
      }
      main.setAttribute("aria-busy", "false");
    } catch (e) {
      renderError(e);
    } finally {
      inFlight = false;
      btn.setAttribute("aria-busy", "false");
      btn.disabled = false;
    }
  }

  function schedulePolling() {
    if (pollTimer) clearInterval(pollTimer);
    const cfg = TAB_CONFIG[currentTab];
    if (cfg.refresh) pollTimer = setInterval(loadCurrentTab, cfg.refresh);
  }

  async function switchTab(name) {
    setActiveTab(name);
    await loadCurrentTab();
    schedulePolling();
  }

  // wire tabs
  for (const t of $$(".tab")) {
    t.addEventListener("click", () => switchTab(t.dataset.tab));
  }
  window.addEventListener("hashchange", () => {
    const name = location.hash.replace("#", "") || "overview";
    if (name !== currentTab) switchTab(name);
  });
  $("#btn-refresh").addEventListener("click", loadCurrentTab);
  $("#dl-close")?.addEventListener("click", closeDrilldown);

  // initial
  const initialTab = location.hash.replace("#", "") || "overview";
  switchTab(initialTab);
</script>
</body>
</html>
