<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<title>OPNsense Manager — PegaProx</title>
<style>
  /* =========================================================================
     Tokens lifted from PegaProx (docker_swarm/swarm.html):
       --accent:#e57000 / --bg:#0f1117 / --card:#1a1d27 / --border:#2a2d3a
       --text:#e4e4e7  / --muted:#71717a / --green:#22c55e / --red:#ef4444
       --yellow:#eab308 / --blue:#3b82f6
     Light variant follows PegaProx light layout palette so the iframe blends
     with whichever theme the dashboard ships (?theme=corp-light|corp-dark).
     ========================================================================= */
  :root {
    --accent: #e57000;
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #a1a1aa; /* zinc-400; PegaProx uses #71717a but it fails WCAG AA contrast on --card */
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --blue: #3b82f6;
    --row-hover: rgba(255, 255, 255, 0.03);
  }
  html.theme-light {
    --bg: #f6f7f9;
    --card: #ffffff;
    --border: #e4e7eb;
    --text: #1e2230;
    --muted: #4b5563; /* gray-600; ensures 4.5:1 on white --card */
    --row-hover: rgba(0, 0, 0, 0.025);
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- shell ----------------------------------------------------- */
  .shell {
    padding: 20px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .header h1 .accent { color: var(--accent); }
  .conn {
    flex: 1;
    color: var(--muted);
    font-size: 12px;
    text-align: right;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .conn b { color: var(--text); font-weight: 600; }

  /* ---------- buttons --------------------------------------------------- */
  .btn {
    appearance: none;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    transition: border-color .15s ease, background .15s ease, transform .1s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { border-color: var(--accent); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn:active { transform: translateY(1px); }
  .btn[aria-busy="true"] { color: var(--muted); border-color: var(--border); cursor: wait; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: #cc6200; }

  /* ---------- cards ----------------------------------------------------- */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .card .title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 0 0 8px;
  }
  .card .lead {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.15;
    color: var(--text);
    margin: 0 0 4px;
    word-break: break-word;
  }
  .card .lead .accent { color: var(--accent); }
  .card .sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ---------- grid system ---------------------------------------------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 12px;
  }
  .span-3 { grid-column: span 3; }
  .span-4 { grid-column: span 4; }
  .span-6 { grid-column: span 6; }
  .span-8 { grid-column: span 8; }
  .span-12 { grid-column: span 12; }

  .section-title {
    grid-column: 1 / -1;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 12px 0 4px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .section-title b { color: var(--text); font-weight: 700; margin-right: 6px; }

  /* ---------- badges (status chips) ------------------------------------ */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 9999px;
    font-size: 11px;
    font-weight: 600;
    gap: 6px;
  }
  .badge::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 9999px;
    background: currentColor;
  }
  /* Badge foreground colours are slightly lighter than the raw token so the
     low-opacity rgba background still clears WCAG AA on --card. */
  .badge-green { background: rgba(34,197,94,.18); color: #4ade80; }
  .badge-red { background: rgba(239,68,68,.18); color: #fca5a5; }
  .badge-yellow { background: rgba(234,179,8,.18); color: #fcd34d; }
  .badge-blue { background: rgba(59,130,246,.18); color: #93c5fd; }
  .badge-muted { background: rgba(113,113,122,.18); color: var(--muted); }
  html.theme-light .badge-green { color: #15803d; }
  html.theme-light .badge-red { color: #b91c1c; }
  html.theme-light .badge-yellow { color: #92400e; }
  html.theme-light .badge-blue { color: #1d4ed8; }
  .chip-row { display: flex; gap: 6px; flex-wrap: wrap; }

  /* ---------- meters ---------------------------------------------------- */
  .meter {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: baseline;
    margin-top: 8px;
    font-size: 12px;
  }
  .meter .label { color: var(--muted); }
  .meter .value { font-variant-numeric: tabular-nums; color: var(--text); font-weight: 600; }
  .meter .bar {
    grid-column: 1 / -1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .meter .bar > i {
    display: block;
    height: 100%;
    background: var(--green);
    transition: width .6s ease;
  }
  .meter.high .bar > i { background: var(--yellow); }
  .meter.crit .bar > i { background: var(--red); }

  /* ---------- tables ---------------------------------------------------- */
  .tt {
    width: 100%;
    border-collapse: collapse;
    margin-top: 4px;
  }
  .tt caption { display: none; }
  .tt th, .tt td {
    text-align: left;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    vertical-align: top;
  }
  .tt th {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .tt tbody tr:hover { background: var(--row-hover); }
  .tt td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .tt td.dim { color: var(--muted); }
  .tt b { font-weight: 600; }

  /* ---------- banners (errors / empty) -------------------------------- */
  .banner {
    grid-column: 1 / -1;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid var(--red);
    background: rgba(239, 68, 68, 0.1);
    color: var(--red);
    font-size: 13px;
  }
  .banner b { color: var(--text); font-weight: 700; }
  .banner.dim { border-color: var(--border); background: var(--card); color: var(--muted); }

  /* ---------- skeletons ------------------------------------------------ */
  .skeleton {
    background: linear-gradient(90deg, var(--border) 0%, var(--row-hover) 50%, var(--border) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s linear infinite;
    height: 14px;
    border-radius: 4px;
  }
  .skeleton.lg { height: 24px; width: 60%; }
  .skeleton.xl { height: 36px; width: 80%; }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .skeleton { animation: none; }
    *, *::before, *::after { transition: none !important; }
  }

  /* ---------- responsive ----------------------------------------------- */
  @media (max-width: 1280px) {
    .span-3 { grid-column: span 4; }
    .span-4 { grid-column: span 6; }
  }
  @media (max-width: 1024px) {
    .grid { grid-template-columns: repeat(6, 1fr); }
    .span-3 { grid-column: span 3; }
    .span-4 { grid-column: span 6; }
    .span-6 { grid-column: span 6; }
    .span-8 { grid-column: span 6; }
    .conn { display: none; }
  }
  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; }
    .span-3, .span-4, .span-6, .span-8 { grid-column: span 1; }
    .shell { padding: 14px; }
    .header h1 { font-size: 16px; }
  }

  .vh {
    position: absolute;
    width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }
</style>
</head>
<body>
<div class="shell">
  <header class="header" role="banner">
    <h1>
      <span class="accent">OPNsense</span>
      <span style="color: var(--muted); font-weight: 500; font-size: 12px; margin-left: 4px;">Manager</span>
    </h1>
    <div class="conn" id="conn" aria-live="polite">
      <b id="conn-host">—</b>
      <span id="conn-version">cargando…</span>
    </div>
    <button class="btn" type="button" id="btn-refresh" aria-label="Refrescar overview">Refresh</button>
  </header>

  <main id="grid" class="grid" aria-busy="true">
    <section class="card span-12" aria-label="Cargando">
      <div class="title">[ system ]</div>
      <div class="skeleton xl" role="presentation" style="margin-top:8px;"></div>
      <div class="skeleton lg" role="presentation" style="margin-top:8px;"></div>
    </section>
  </main>
</div>

<script type="module">
  // Theme awareness — PegaProx passes ?theme=corp-light|corp-dark|... when
  // it embeds the plugin in its iframe. Treat anything containing "light"
  // as light mode, default to dark.
  (function applyTheme() {
    const params = new URLSearchParams(location.search);
    const theme = params.get("theme") || "";
    if (/light/i.test(theme)) {
      document.documentElement.classList.add("theme-light");
    }
  })();

  const $ = (s, r = document) => r.querySelector(s);
  const el = (tag, attrs = {}, children = []) => {
    const n = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
      if (k === "class") n.className = v;
      else if (k === "html") n.innerHTML = v;
      else if (k === "text") n.textContent = v;
      else if (k.startsWith("aria-") || k === "role") n.setAttribute(k, v);
      else if (k.startsWith("data-")) n.setAttribute(k, v);
      else n[k] = v;
    }
    for (const c of (Array.isArray(children) ? children : [children])) {
      if (c == null) continue;
      n.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
    }
    return n;
  };
  const fmtBytes = (n) => {
    if (!n || n < 0) return "0 B";
    const u = ["B", "KB", "MB", "GB", "TB", "PB"];
    let i = 0, v = n;
    while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
    return `${v.toFixed(v >= 100 ? 0 : v >= 10 ? 1 : 2)} ${u[i]}`;
  };
  const meterClass = (p) => p > 85 ? "crit" : p > 65 ? "high" : "";
  const escapeText = (s) => String(s ?? "").replace(/[<>&"]/g, c => ({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c]));

  // Endpoint resolves under /api/plugins/opnsense/api/overview when served by
  // PegaProx (this HTML lives at /api/plugins/opnsense/api/ui).
  const ENDPOINT = "../api/overview";

  async function fetchOverview() {
    const r = await fetch(ENDPOINT, { credentials: "same-origin" });
    if (r.status === 401) throw Object.assign(new Error("auth"), { kind: "auth" });
    if (!r.ok) {
      let detail = "";
      try { detail = (await r.json()).detail || ""; } catch {}
      throw Object.assign(new Error(`HTTP ${r.status}`), { kind: "upstream", detail });
    }
    const body = await r.json();
    if (!body.ok) throw Object.assign(new Error(body.error || "upstream"), { kind: body.error || "upstream", detail: body.detail });
    return body.data;
  }

  // ---------- renderers ----------
  function renderHeader(data) {
    $("#conn-host").textContent = data?.system?.name || "—";
    const versions = (data?.system?.versions || []).join(" · ");
    $("#conn-version").textContent = versions;
    $("#conn").title = versions;
  }

  function cellSystem(s) {
    const memPct = s.memory_used_pct || 0;
    const pfPct = s.pf_states_pct || 0;
    return el("section", { class: "card span-4", "aria-label": "Sistema" }, [
      el("p", { class: "title" }, "[ system ]"),
      el("p", { class: "lead", text: s.name || "—" }),
      el("div", { class: "sub", text: (s.versions || []).join(" / ") || "version desconocida" }),
      el("div", { class: "meter " + meterClass(memPct) }, [
        el("span", { class: "label", text: "RAM " + (s.memory_used_mb || 0) + "/" + (s.memory_total_mb || 0) + " MB" }),
        el("span", { class: "value", text: memPct.toFixed(1) + "%" }),
        el("span", { class: "bar" }, [el("i", { style: `width:${memPct}%` })]),
      ]),
      el("div", { class: "meter " + meterClass(pfPct) }, [
        el("span", { class: "label", text: "pf states " + (s.pf_states_current || 0) + " / " + (s.pf_states_limit || 0) }),
        el("span", { class: "value", text: pfPct.toFixed(2) + "%" }),
        el("span", { class: "bar" }, [el("i", { style: `width:${pfPct}%` })]),
      ]),
      el("div", { class: "sub", text: `Load ${(s.loadavg || []).map(n => n.toFixed(2)).join("  ") || "—"}  ·  Up ${s.uptime || "—"}` }),
    ]);
  }

  function cellHA(h) {
    const enabled = !!h.enabled;
    const badge = el("span", {
      class: "badge " + (enabled ? "badge-green" : "badge-muted"),
      text: enabled ? "Activo" : "Inactivo",
    });
    return el("section", { class: "card span-4", "aria-label": "HA Sync" }, [
      el("p", { class: "title" }, "[ ha sync ]"),
      el("p", { class: "lead" }, [el("span", { class: "accent", text: enabled ? "ON" : "OFF" })]),
      el("div", { class: "sub", text: `Iface ${h.pfsync_interface || "—"} · Peer ${h.pfsync_peer_ip || "—"}` }),
      el("div", { class: "sub", text: `Versión ${h.pfsync_version || "—"}` }),
      el("div", { class: "chip-row", style: "margin-top:8px;" }, [badge]),
    ]);
  }

  function cellCerts(c) {
    const expiringSoon = c.expiring_soon_count > 0;
    const badgeCls = expiringSoon ? "badge-yellow" : "badge-green";
    const badgeText = expiringSoon ? `${c.expiring_soon_count} próx. a vencer` : "Todos vigentes";
    return el("section", { class: "card span-4", "aria-label": "Certificados" }, [
      el("p", { class: "title" }, "[ certs ]"),
      el("p", { class: "lead" }, [el("span", { class: "accent", text: String(c.total) })]),
      el("div", { class: "sub", text: `${c.expiring_soon_count} expiran en 30 días` }),
      el("div", { class: "chip-row", style: "margin-top:8px;" }, [
        el("span", { class: "badge " + badgeCls, text: badgeText }),
      ]),
    ]);
  }

  function cellInterfaces(rows) {
    const cell = el("section", { class: "card span-8", "aria-label": "Interfaces" }, [
      el("p", { class: "title" }, "[ interfaces ]"),
    ]);
    const table = el("table", { class: "tt" });
    table.innerHTML = `
      <caption>Interfaces con contadores de tráfico</caption>
      <thead><tr>
        <th>Iface</th><th>Etiqueta</th><th>Estado</th><th>IPv4</th>
        <th class="num">RX</th><th class="num">TX</th><th class="num">Err</th><th class="num">Drop</th>
      </tr></thead><tbody></tbody>`;
    const tb = $("tbody", table);
    for (const i of rows) {
      const ip4 = (i.ipv4 || []).map(x => `${x.ipaddr}/${x.subnetbits}`).join(" ") || "—";
      const tr = document.createElement("tr");
      const stateChip = i.is_up
        ? '<span class="badge badge-green">UP</span>'
        : '<span class="badge badge-red">DOWN</span>';
      tr.innerHTML = `
        <td><b>${escapeText(i.name)}</b></td>
        <td class="dim">${escapeText(i.label || "—")}</td>
        <td>${stateChip}</td>
        <td class="dim">${escapeText(ip4)}</td>
        <td class="num">${fmtBytes(i.received_bytes)}</td>
        <td class="num">${fmtBytes(i.sent_bytes)}</td>
        <td class="num">${i.received_errors + i.send_errors}</td>
        <td class="num">${i.dropped_packets}</td>`;
      tb.appendChild(tr);
    }
    if (!rows.length) {
      tb.innerHTML = `<tr><td colspan="8" class="dim">Sin interfaces reportadas.</td></tr>`;
    }
    cell.appendChild(table);
    return cell;
  }

  function cellGateways(rows) {
    const cell = el("section", { class: "card span-4", "aria-label": "Gateways" }, [
      el("p", { class: "title" }, "[ gateways ]"),
    ]);
    const table = el("table", { class: "tt" });
    table.innerHTML = `
      <caption>Gateways con RTT y pérdida</caption>
      <thead><tr>
        <th>Nombre</th><th>Estado</th><th class="num">RTT</th><th class="num">Loss</th>
      </tr></thead><tbody></tbody>`;
    const tb = $("tbody", table);
    for (const g of rows) {
      const tr = document.createElement("tr");
      const cls = g.is_up ? "badge-green" : "badge-red";
      tr.innerHTML = `
        <td><b>${escapeText(g.name)}</b><div class="dim" style="font-size:11px;">${escapeText(g.address)}</div></td>
        <td><span class="badge ${cls}">${escapeText(g.status_human || g.status)}</span></td>
        <td class="num">${g.delay_ms ? g.delay_ms.toFixed(1) + " ms" : "—"}</td>
        <td class="num">${g.loss_pct ? g.loss_pct.toFixed(1) + "%" : "—"}</td>`;
      tb.appendChild(tr);
    }
    if (!rows.length) {
      tb.innerHTML = `<tr><td colspan="4" class="dim">Sin gateways configurados.</td></tr>`;
    }
    cell.appendChild(table);
    return cell;
  }

  function cellServices(s) {
    const cell = el("section", { class: "card span-6", "aria-label": "Servicios" }, [
      el("p", { class: "title" }, "[ servicios ]"),
      el("p", { class: "lead" }, [
        el("span", { class: "accent", text: String(s.running) }),
        document.createTextNode(` / ${s.total}`),
      ]),
      el("div", { class: "sub", text: `${s.stopped} detenidos` }),
    ]);
    if (s.stopped > 0) {
      const stopped = s.items.filter(x => !x.running).slice(0, 6).map(x => x.name);
      cell.appendChild(el("div", {
        class: "sub",
        style: "margin-top:8px;",
        text: "Detenidos: " + stopped.join(", "),
      }));
    }
    return cell;
  }

  function cellVPN(v) {
    const wgChip = el("span", {
      class: "badge " + (v.wireguard_enabled ? "badge-green" : "badge-muted"),
      text: "WireGuard " + (v.wireguard_enabled ? "ON" : "OFF"),
    });
    const ipsecChip = el("span", { class: "badge badge-blue", text: `IPsec ${v.ipsec_phase1.length}` });
    const ovpnChip = el("span", { class: "badge badge-blue", text: `OpenVPN ${v.openvpn_sessions.length}` });
    const lead = `${v.wireguard_peers.length} WG · ${v.ipsec_phase1.length} IPSEC · ${v.openvpn_sessions.length} OVPN`;
    return el("section", { class: "card span-6", "aria-label": "VPN" }, [
      el("p", { class: "title" }, "[ vpn ]"),
      el("p", { class: "lead", text: lead }),
      el("div", { class: "chip-row", style: "margin-top:8px;" }, [wgChip, ipsecChip, ovpnChip]),
    ]);
  }

  function render(data) {
    const main = $("#grid");
    main.setAttribute("aria-busy", "false");
    main.replaceChildren(
      cellSystem(data.system),
      cellHA(data.hasync),
      cellCerts(data.certs),
      el("h2", { class: "section-title" }, [
        el("b", { text: "Data plane" }),
        document.createTextNode("interfaces · gateways · routing"),
      ]),
      cellInterfaces(data.interfaces),
      cellGateways(data.gateways),
      el("h2", { class: "section-title" }, [
        el("b", { text: "Control plane" }),
        document.createTextNode("services · vpn · certs"),
      ]),
      cellServices(data.services),
      cellVPN(data.vpn),
    );
  }

  function renderError(err) {
    const main = $("#grid");
    main.setAttribute("aria-busy", "false");
    let title = "Error upstream";
    let body = err.detail || err.message || "Error desconocido";
    if (err.kind === "auth") {
      title = "Autenticación falló";
      body = "OPNsense rechazó la API key + secret. Revisá la configuración del plugin.";
    } else if (err.kind === "timeout") {
      title = "Timeout";
      body = "OPNsense no respondió a tiempo. Reintentá o verificá conectividad.";
    } else if (err.kind === "unconfigured") {
      title = "Plugin sin configurar";
      body = "Editá /opt/PegaProx/plugins/opnsense/config.json con un host OPNsense.";
    }
    main.replaceChildren(
      el("div", { class: "banner", role: "alert" }, [
        el("b", { text: title }),
        document.createTextNode(" — " + body),
      ])
    );
  }

  // ---------- controller ----------
  let inFlight = false;
  async function refresh() {
    if (inFlight) return;
    inFlight = true;
    const btn = $("#btn-refresh");
    btn.setAttribute("aria-busy", "true");
    btn.disabled = true;
    try {
      const data = await fetchOverview();
      renderHeader(data);
      render(data);
    } catch (e) {
      renderError(e);
    } finally {
      inFlight = false;
      btn.setAttribute("aria-busy", "false");
      btn.disabled = false;
    }
  }

  $("#btn-refresh").addEventListener("click", refresh);
  setInterval(refresh, 30_000);
  refresh();
</script>
</body>
</html>
